<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可爱欧美风电商</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <h1>Cutie Shop</h1>
            </div>
            <div class="nav-links">
                <a href="#">首页</a>
                <a href="#">新品</a>
                <a href="#">热销</a>
                <a href="#">关于我们</a>
            </div>
            <div class="cart-container">
                <button class="cart-btn">
                    <span class="cart-icon">🛒</span>
                    <span class="cart-count">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 主内容区域 -->
    <main class="main-content">
        <h2 class="section-title">精选商品</h2>
        <div class="products-grid">
            <!-- 商品卡片 1 -->
            <div class="product-card" data-name="可爱粉色背包">
                <div class="product-image">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20pink%20backpack%20with%20cute%20patterns%20cartoon%20style&image_size=square" alt="可爱粉色背包">
                </div>
                <div class="product-info">
                    <h3 class="product-name">可爱粉色背包</h3>
                    <p class="product-price">¥129.00</p>
                    <div class="quantity-control">
                        <button class="decrease-btn">-</button>
                        <span class="quantity">1</span>
                        <button class="increase-btn">+</button>
                    </div>
                    <button class="add-to-cart-btn">加入购物车</button>
                </div>
            </div>

            <!-- 商品卡片 2 -->
            <div class="product-card" data-name="草莓耳环">
                <div class="product-image">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20strawberry%20earrings%20pink%20color%20cartoon%20style&image_size=square" alt="草莓耳环">
                </div>
                <div class="product-info">
                    <h3 class="product-name">草莓耳环</h3>
                    <p class="product-price">¥39.00</p>
                    <div class="quantity-control">
                        <button class="decrease-btn">-</button>
                        <span class="quantity">1</span>
                        <button class="increase-btn">+</button>
                    </div>
                    <button class="add-to-cart-btn">加入购物车</button>
                </div>
            </div>

            <!-- 商品卡片 3 -->
            <div class="product-card" data-name="粉色毛绒玩具">
                <div class="product-image">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20pink%20plush%20toy%20soft%20cartoon%20style&image_size=square" alt="粉色毛绒玩具">
                </div>
                <div class="product-info">
                    <h3 class="product-name">粉色毛绒玩具</h3>
                    <p class="product-price">¥89.00</p>
                    <div class="quantity-control">
                        <button class="decrease-btn">-</button>
                        <span class="quantity">1</span>
                        <button class="increase-btn">+</button>
                    </div>
                    <button class="add-to-cart-btn">加入购物车</button>
                </div>
            </div>

            <!-- 商品卡片 4 -->
            <div class="product-card" data-name="粉色笔记本">
                <div class="product-image">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20pink%20notebook%20with%20cute%20patterns%20cartoon%20style&image_size=square" alt="粉色笔记本">
                </div>
                <div class="product-info">
                    <h3 class="product-name">粉色笔记本</h3>
                    <p class="product-price">¥29.00</p>
                    <div class="quantity-control">
                        <button class="decrease-btn">-</button>
                        <span class="quantity">1</span>
                        <button class="increase-btn">+</button>
                    </div>
                    <button class="add-to-cart-btn">加入购物车</button>
                </div>
            </div>

            <!-- 商品卡片 5 -->
            <div class="product-card" data-name="粉色发夹">
                <div class="product-image">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20pink%20hair%20clips%20with%20cute%20designs%20cartoon%20style&image_size=square" alt="粉色发夹">
                </div>
                <div class="product-info">
                    <h3 class="product-name">粉色发夹</h3>
                    <p class="product-price">¥19.00</p>
                    <div class="quantity-control">
                        <button class="decrease-btn">-</button>
                        <span class="quantity">1</span>
                        <button class="increase-btn">+</button>
                    </div>
                    <button class="add-to-cart-btn">加入购物车</button>
                </div>
            </div>

            <!-- 商品卡片 6 -->
            <div class="product-card" data-name="粉色杯子">
                <div class="product-image">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20pink%20cup%20with%20cute%20patterns%20cartoon%20style&image_size=square" alt="粉色杯子">
                </div>
                <div class="product-info">
                    <h3 class="product-name">粉色杯子</h3>
                    <p class="product-price">¥49.00</p>
                    <div class="quantity-control">
                        <button class="decrease-btn">-</button>
                        <span class="quantity">1</span>
                        <button class="increase-btn">+</button>
                    </div>
                    <button class="add-to-cart-btn">加入购物车</button>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-section">
                <h3>关于我们</h3>
                <p>Cutie Shop 是一家专注于可爱欧美风产品的电商平台，为您提供最萌最潮的商品。</p>
            </div>
            <div class="footer-section">
                <h3>联系方式</h3>
                <p>邮箱: info@cutieshop.com</p>
                <p>电话: 123-456-7890</p>
            </div>
            <div class="footer-section">
                <h3>关注我们</h3>
                <div class="social-links">
                    <a href="#">微信</a>
                    <a href="#">微博</a>
                    <a href="#">Instagram</a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Cutie Shop. 保留所有权利。</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
